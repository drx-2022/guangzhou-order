<!DOCTYPE html>
<html class="light" lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ket qua thanh toan - Guangzhou Direct</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003461",
                        "primary-container": "#004B87",
                        "on-primary": "#ffffff",
                        "background": "#f8f9fb",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424750",
                        "outline-variant": "#c2c6d1",
                        "success": "#00544b",
                        "success-light": "#e6f5f0",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                    },
                    fontFamily: { "headline": ["Manrope"], "body": ["Manrope"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        @keyframes scale-in { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .animate-scale-in { animation: scale-in 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased min-h-screen flex flex-col">

<nav class="fixed top-0 w-full z-50 bg-[#f8f9fb]/80 backdrop-blur-xl shadow-sm">
    <div class="flex justify-between items-center px-6 py-3 w-full max-w-screen-2xl mx-auto">
        <a class="text-xl font-black text-[#003461] tracking-tighter font-headline no-underline" th:href="@{/}">Guangzhou Direct</a>
    </div>
</nav>

<main class="flex-1 flex items-center justify-center pt-24 px-4">
    <div class="max-w-md w-full text-center">

        <div class="animate-scale-in inline-flex items-center justify-center w-20 h-20 rounded-full bg-success-light mb-6">
            <span class="material-symbols-outlined text-5xl text-success" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </div>

        <h1 class="text-2xl font-extrabold font-headline text-primary mb-2" th:text="${message}">Thanh toan thanh cong!</h1>
        <p class="text-on-surface-variant mb-8">Don hang cua ban da duoc xac nhan va se duoc xu ly som nhat.</p>

        <div class="bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-sm p-6 mb-8 text-left">
            <h3 class="text-sm font-bold text-on-surface-variant uppercase tracking-wider mb-4">Chi tiet don hang</h3>
            <div class="space-y-3">
                <div class="flex justify-between">
                    <span class="text-sm text-on-surface-variant">Ma don hang</span>
                    <span class="text-sm font-bold" th:text="'#' + ${order.orderId}">#0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-on-surface-variant">Trang thai</span>
                    <span class="text-sm font-bold text-success" th:text="${order.status}">IN_PRODUCTION</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-sm text-on-surface-variant">Tong cong</span>
                    <span class="text-sm font-bold" th:text="${#numbers.formatDecimal(order.finalPrice, 0, 'COMMA', 0, 'POINT')} + ' d'">0 d</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a class="px-6 py-3 bg-primary text-on-primary font-bold rounded-lg hover:opacity-90 transition-all inline-flex items-center justify-center gap-2"
               th:href="@{/orders}">
                <span class="material-symbols-outlined text-sm">inventory_2</span>
                Xem don hang
            </a>
            <a class="px-6 py-3 bg-surface-container-low border border-outline-variant text-on-surface font-bold rounded-lg hover:bg-surface-container transition-all inline-flex items-center justify-center gap-2"
               th:href="@{/}">
                <span class="material-symbols-outlined text-sm">home</span>
                Ve trang chu
            </a>
        </div>
    </div>
</main>

</body>
</html>
