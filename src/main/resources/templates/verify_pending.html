<!DOCTYPE html>

<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verify Email | Guangzhou Direct</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f8f9fb",
              "on-tertiary-fixed": "#00201c",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#00544b",
              "on-surface-variant": "#424750",
              "secondary": "#48626e",
              "surface-container-low": "#f2f4f6",
              "on-error-container": "#93000a",
              "inverse-on-surface": "#eff1f3",
              "primary-container": "#004b87",
              "tertiary-fixed": "#8df5e4",
              "primary": "#003461",
              "surface": "#f8f9fb",
              "on-secondary": "#ffffff",
              "on-tertiary-container": "#63cbbb",
              "error": "#ba1a1a",
              "surface-tint": "#27609d",
              "surface-container": "#eceef0",
              "outline-variant": "#c2c6d1",
              "on-background": "#191c1e",
              "outline": "#727781",
              "on-primary-fixed-variant": "#004882",
              "on-surface": "#191c1e",
              "primary-fixed": "#d3e4ff",
              "secondary-fixed": "#cbe7f5",
              "on-primary-fixed": "#001c38",
              "on-error": "#ffffff",
              "surface-dim": "#d8dadc",
              "surface-variant": "#e0e3e5",
              "primary-fixed-dim": "#a3c9ff",
              "inverse-surface": "#2d3133",
              "inverse-primary": "#a3c9ff",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed": "#021f29",
              "surface-container-high": "#e6e8ea",
              "on-primary-container": "#8abcff",
              "tertiary-fixed-dim": "#70d8c8",
              "on-tertiary-fixed-variant": "#005048",
              "on-secondary-fixed-variant": "#304a55",
              "secondary-fixed-dim": "#afcbd8",
              "secondary-container": "#cbe7f5",
              "error-container": "#ffdad6",
              "background": "#f8f9fb",
              "surface-container-highest": "#e0e3e5",
              "on-primary": "#ffffff",
              "on-secondary-container": "#4e6874",
              "tertiary": "#003b34"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #003461 0%, #004b87 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
<!-- Card Container -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.06)]">

<!-- Mail Icon -->
<div class="flex justify-center mb-6">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">mark_email_unread</span>
</div>
</div>

<!-- Headline -->
<h1 class="font-headline text-3xl font-bold text-on-surface text-center mb-3">
                Check your inbox
            </h1>

<!-- Subtext with Masked Email -->
<p class="text-center text-on-surface-variant font-medium mb-8 leading-relaxed">
                We sent a verification link to <span class="font-bold text-on-surface" th:text="${maskedEmail}"></span>. Click the link to activate your account.
            </p>

<!-- Success Message -->
<div th:if="${resendSuccess}" class="p-4 bg-tertiary-fixed rounded-lg mb-6">
<p class="text-tertiary text-sm font-medium text-center">Verification email resent successfully!</p>
</div>

<!-- Error Message -->
<div th:if="${resendError}" class="p-4 bg-error-container rounded-lg mb-6">
<p class="text-error text-sm font-medium text-center" th:text="${resendError}"></p>
</div>

<!-- Resend Verification Form -->
<form class="mb-6" th:action="@{/resend-verification}" method="post">
<input type="hidden" name="email" th:value="${email}"/>
<button
        id="resendButton"
        class="w-full primary-gradient text-white font-headline font-bold py-4 rounded-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200 tracking-wide uppercase text-sm disabled:opacity-50 disabled:cursor-not-allowed"
        type="submit"
        disabled
>
<span id="buttonLabel">Resend in 30s</span>
</button>
</form>

<!-- Back to Sign Up Link -->
<div class="text-center">
<p class="text-xs text-on-surface-variant">
                Wrong email?
                <a class="text-primary font-bold hover:underline" th:href="@{/signup}">Go back to Sign Up</a>
</p>
</div>

</div>
</div>

<!-- Countdown Logic -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const resendButton = document.getElementById('resendButton');
        const buttonLabel = document.getElementById('buttonLabel');
        let countdown = 30;

        // Start the countdown interval
        const countdownInterval = setInterval(function() {
            countdown--;

            if (countdown > 0) {
                buttonLabel.textContent = 'Resend in ' + countdown + 's';
            } else {
                // Countdown complete
                clearInterval(countdownInterval);
                resendButton.disabled = false;
                buttonLabel.textContent = 'Resend verification email';
            }
        }, 1000);
    });
</script>
</body></html>
