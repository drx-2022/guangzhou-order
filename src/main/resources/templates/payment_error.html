<!DOCTYPE html>
<html class="light" lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Loi Thanh Toan - Guangzhou Direct</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003461",
                        "primary-container": "#004B87",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "background": "#f8f9fb",
                        "surface": "#f8f9fb",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424750",
                        "outline-variant": "#c2c6d1",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased">

<nav class="fixed top-0 w-full z-50 bg-[#f8f9fb]/80 backdrop-blur-xl shadow-sm">
    <div class="flex justify-between items-center px-6 py-3 w-full max-w-screen-2xl mx-auto">
        <a class="text-xl font-black text-[#003461] tracking-tighter font-headline no-underline" th:href="@{/}">Guangzhou Direct</a>
        <div class="flex items-center gap-4">
            <a class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors" th:href="@{/orders}">
                <span class="material-symbols-outlined text-sm align-middle mr-1">arrow_back</span>
                Ve Don hang
            </a>
        </div>
    </div>
</nav>

<main class="pt-32 pb-12 px-4 md:px-8 max-w-2xl mx-auto">
    <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant/20 shadow-lg p-8 text-center">
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-full bg-error-container/30 flex items-center justify-center">
                <span class="material-symbols-outlined text-5xl text-error">error</span>
            </div>
        </div>

        <h1 class="text-2xl md:text-3xl font-bold font-headline text-on-surface mb-2">Co Loi Xay Ra</h1>
        <p class="text-on-surface-variant mb-6" th:text="${errorMessage}">Thanh toan chua duoc xac nhan</p>

        <div class="space-y-3">
            <a class="inline-block w-full md:w-auto px-8 py-3 bg-primary text-white font-bold rounded-lg hover:bg-primary-container transition-all"
               th:href="@{/orders}">
                Ve Don hang
            </a>
            <p class="text-sm text-on-surface-variant">
                Neu ban van gap van de, vui long <a class="text-primary font-bold hover:underline" href="/support">lien he ho tro</a>
            </p>
        </div>
    </div>
</main>

</body>
</html>
